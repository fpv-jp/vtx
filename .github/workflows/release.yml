name: Create Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Get latest successful workflow run
        id: get-run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'multi-platform-build.yml',
              branch: 'main',
              status: 'success',
              per_page: 1
            });

            if (runs.data.workflow_runs.length === 0) {
              core.setFailed('No successful workflow runs found on main branch');
              return;
            }

            const runId = runs.data.workflow_runs[0].id;
            console.log(`Using artifacts from run: ${runId}`);
            return runId;

      - name: Download artifacts from main branch
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.get-run.outputs.result }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts

      - name: Display artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -R artifacts/
          find artifacts -type f

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -exec cp -v {} release/ \;
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
